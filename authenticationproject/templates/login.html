<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <style>
      /* Google Font */
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
      }
      
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        padding: 20px;
      }
      
      .signin-card {
        width: 130%;
        max-width: 420px;
        background: #fff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
      }
      
      .signin-card h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #222;
        font-size: 34px;
        font-weight: 700;
      }
      
      .input-group {
        margin-bottom: 22px;
      }
      
      .input-group label {
        display: block;
        margin-bottom: 8px;
        color: #444;
        font-size: 15px;
        font-weight: 500;
      }
      
      .input-group input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #ddd;
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        transition: 0.3s;
        background: #fafafa;
      }
      
      .input-group input:focus {
        border-color: #4f46e5;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
      }
      
      button {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 12px;
        background: #4f46e5;
        color: #fff;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }
      
      button:hover {
        background: #4338ca;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
      }
      
      button:active {
        transform: translateY(0);
      }
      
      @media (max-width: 480px) {
        .signin-card {
          padding: 30px 22px;
        }
      
        .signin-card h1 {
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="signin-card">
        <h1>Sign In</h1>

        <form method="post" action="/login">
          {% csrf_token %}
          <div class="input-group">
            <label for="email">username</label>
            <input type="text" id="email" name="username" placeholder="username" required />
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />
          </div>

          <button type="submit">Sign In</button>
        </form>
      </div>
    </div>
  </body>
</html>
